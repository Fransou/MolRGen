# Configuration for the main figure (1st plot)
paths:
  molstral_path: "MolGenOutput/test_ood"
  fig_path: "MolGenDocking-latex/Figures/Results/MolGen"
  output_subdir: "diversity_rewards"
  output_suffix: "-main"

data:
  subsample_models:
    - "MiniMax-M2"
    - "Qwen3-Next-80B-A3B-Thinking"
    - "RL-Mistral-24B"
    - "RL-Molstral"
    - "gemma-4-31B-it"
  remove_model:
    - "gpt-oss"
    - "R1-Llama"
    - "R1-Qwen"

plot:
  fp_name: "ecfp6-2048"
  cols_vals:
    - 4
    - 16
  x_vals: null
  row: "n_rollout_per_k"
  row_vals:
    - 2
    - 4
  col: "k"
  x: "sim"
  column_name: "k"
  xlabel: "Similarity threshold between candidate clusters"
  xlabel_x: 0.5
  ylabel_x: 0.05
  legend: true
  legend_bbox: [0.5, -0.16]
  legend_ncols: 6
  height: 2.2
  aspect: 1.9
  markersize:
    normal: 6
    highlight: 7

sim_values:
  type: "logspace"
  start: -1.2
  stop: -0.001
  num: 15
